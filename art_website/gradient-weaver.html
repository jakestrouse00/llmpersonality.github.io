<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wash Gradient Weaver — The Inkwell Atelier</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-tool="gradient">

  <nav id="ink-sidebar">
    <div class="sidebar-brand">
      <svg><use xlink:href="assets/icons.svg#icon-hub"></use></svg>
      <span class="brand-text">Inkwell</span>
    </div>
    <ul class="sidebar-tools">
      <li><a href="index.html" class="nav-link" data-tool="hub"><svg><use xlink:href="assets/icons.svg#icon-hub"></use></svg><span class="nav-tooltip">Studio Hub</span></a></li>
      <li><a href="fluid-watercolor.html" class="nav-link" data-tool="fluid"><svg><use xlink:href="assets/icons.svg#icon-fluid"></use></svg><span class="nav-tooltip">Fluid Watercolor</span></a></li>
      <li><a href="dynamic-ink.html" class="nav-link" data-tool="ink"><svg><use xlink:href="assets/icons.svg#icon-ink"></use></svg><span class="nav-tooltip">Dynamic Ink</span></a></li>
      <li><a href="zen-garden.html" class="nav-link" data-tool="zen"><svg><use xlink:href="assets/icons.svg#icon-zen"></use></svg><span class="nav-tooltip">Zen Garden</span></a></li>
      <li><a href="sumi-e.html" class="nav-link" data-tool="sumi"><svg><use xlink:href="assets/icons.svg#icon-sumi"></use></svg><span class="nav-tooltip">Sumi-e</span></a></li>
      <li><a href="bleed-bloom.html" class="nav-link" data-tool="bleed"><svg><use xlink:href="assets/icons.svg#icon-bleed"></use></svg><span class="nav-tooltip">Bleed &amp; Bloom</span></a></li>
      <li><a href="splatter.html" class="nav-link" data-tool="splatter"><svg><use xlink:href="assets/icons.svg#icon-splatter"></use></svg><span class="nav-tooltip">Splatter</span></a></li>
      <li><a href="gradient-weaver.html" class="nav-link" data-tool="gradient"><svg><use xlink:href="assets/icons.svg#icon-gradient"></use></svg><span class="nav-tooltip">Gradient Weaver</span></a></li>
    </ul>
    <ul class="sidebar-bottom">
      <li><a href="gallery.html" class="nav-link" data-tool="gallery"><svg><use xlink:href="assets/icons.svg#icon-gallery"></use></svg><span class="nav-tooltip">Gallery</span></a></li>
    </ul>
  </nav>

  <div class="tool-page">
    <header class="tool-header">
      <h1>Wash Gradient Weaver</h1>
    </header>
    <div class="tool-workspace">
      <div class="canvas-container" id="canvas-container"></div>
      <aside class="tool-controls">
        <div class="tool-control-group">
          <label>Gradient Softness <span class="value-display" id="val-softness">50</span></label>
          <input type="range" class="ink-slider" id="slider-softness" min="10" max="100" value="50">
        </div>
        <div class="tool-control-group">
          <label>Wash Transparency <span class="value-display" id="val-transparency">40</span></label>
          <input type="range" class="ink-slider" id="slider-transparency" min="5" max="100" value="40">
        </div>
        <div class="tool-control-group">
          <label>Sponge Grain <span class="value-display" id="val-grain">30</span></label>
          <input type="range" class="ink-slider" id="slider-grain" min="0" max="100" value="30">
        </div>
        <hr class="ink-separator">
        <div class="tool-control-group">
          <label>Wash Type</label>
          <div class="ink-palette" id="wash-type">
            <button class="ink-swatch active" data-type="linear" style="background:linear-gradient(135deg,#1a1a2e 0%,#1a1a2e 40%,transparent 40%);border-radius:4px;width:40px;height:26px" title="Linear"></button>
            <button class="ink-swatch" data-type="radial" style="background:radial-gradient(circle,#1a1a2e 0%,#1a1a2e 30%,transparent 30%);border-radius:4px;width:40px;height:26px" title="Radial"></button>
          </div>
        </div>
        <div class="tool-control-group">
          <label>Wash Palette</label>
          <div class="ink-palette" id="palette">
            <div class="ink-swatch active" data-color="#3a4a5a" style="background:#3a4a5a" title="Slate Mist"></div>
            <div class="ink-swatch" data-color="#1a3a4a" style="background:#1a3a4a" title="Deep Teal"></div>
            <div class="ink-swatch" data-color="#c17f59" style="background:#c17f59" title="Sunset Ochre"></div>
            <div class="ink-swatch" data-color="#8b5a3a" style="background:#8b5a3a" title="Sienna"></div>
            <div class="ink-swatch" data-color="#4a3a5a" style="background:#4a3a5a" title="Twilight"></div>
            <div class="ink-swatch" data-color="#2d5a3d" style="background:#2d5a3d" title="Forest"></div>
            <div class="ink-swatch" data-color="#1a1a2e" style="background:#1a1a2e" title="Indigo"></div>
            <div class="ink-swatch" data-color="#5a5a5a" style="background:#5a5a5a" title="Silver Wash"></div>
          </div>
        </div>
        <hr class="ink-separator">
        <button class="ink-button ink-button-save" id="btn-save">Save to Gallery</button>
        <button class="ink-button ink-button-clear" id="btn-clear">Clear Canvas</button>
      </aside>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/gradient-weaver.js"></script>
</body>
</html>
