<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents – LLMPersonality</title>
  <meta name="description" content="Explore the six distinct agent personas in the LLMPersonality framework.">
  
  <!-- Skip link for keyboard accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <!-- Root-relative base for sub-path compatibility -->
  <base href="./">
  
  <!-- Zero-FOUC Theme + Contrast Preloader -->
  <script>
    (function() {
      var storedTheme = localStorage.getItem('theme_v1');
      var storedContrast = localStorage.getItem('contrast_v1');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = (storedTheme === 'dark' || storedTheme === 'light') ? storedTheme : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      if (storedContrast === 'high') {
        document.documentElement.setAttribute('data-contrast', 'high');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="index.html" class="nav-logo">LLMPersonality</a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="agents.html" class="nav-link active">Agents</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
      </ul>
      <div class="nav-toggles">
        <button id="contrast-toggle" class="nav-toggle" aria-label="Toggle high contrast mode" title="High contrast">
          <span class="toggle-icon">◐</span>
        </button>
        <button id="theme-toggle" class="nav-toggle" aria-label="Toggle dark/light mode" title="Dark mode">
          <span class="toggle-icon">🌙</span>
        </button>
      </div>
    </nav>
  </header>

  <main id="main-content" class="agents-main container">
    <section class="agents-header">
      <h1 class="page-title reveal">Agent Explorer</h1>
      <p class="page-desc reveal">Browse, filter, and deep-dive into each agent's role, personality traits, and example responses.</p>
    </section>

    <section class="agents-filter">
      <div class="filter-group reveal">
        <button class="filter-btn active" data-filter="all">All Agents</button>
        <button class="filter-btn" data-filter="process">Process</button>
        <button class="filter-btn" data-filter="creative">Creative</button>
        <button class="filter-btn" data-filter="critical">Critical</button>
        <button class="filter-btn" data-filter="knowledge">Knowledge</button>
      </div>
    </section>

    <section class="agents-grid" id="agents-grid">
      <!-- Cards rendered by agents-ui.js -->
    </section>
  </main>

  <!-- Modal for agent deep-dive -->
  <div id="agent-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Close modal">&times;</button>
      <div class="modal-body" id="modal-body">
        <!-- Content injected by agents-ui.js -->
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2024 LLMPersonality. Open-source under MIT License.</p>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
